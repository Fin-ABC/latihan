<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenary Operator</title>
</head>
<body>
    <script>
        let nilai = 70;
        // Jika true maka akan ambil hasil yang kiri, dan jika false maka akan ngambil hasil kanan
        let ucapan = nilai >= 75 ? "Selamat kamu lulus" : "Sayang sekali, silahkan coba lagi";

        document.writeln(`<p> ${ucapan} </p>`);
    </script>
</body>
</html>
