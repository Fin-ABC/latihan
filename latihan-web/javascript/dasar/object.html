<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object</title>
  </head>
  <body>
    <script>
      let profil = [
        {
          nama: "Fin",
          alamat: "Indonesia",
          umur: 999,
        },
        {
          nama: "Devara",
          alamat: "Indonesia",
          umur: 53,
        },
      ];

      console.info(`Nama : ${profil[0].nama}`);
      console.info(`Alamat : ${profil[0].alamat}`);
      console.info(`Umur : ${profil[0].umur}`);

      console.info(`Nama : ${profil[1].nama}`);
      console.info(`Alamat : ${profil[1].alamat}`);
      console.info(`Umur : ${profil[1].umur}`);
    </script>
  </body>
</html>
