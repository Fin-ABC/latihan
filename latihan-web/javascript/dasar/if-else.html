<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Else</title>
</head>
<body>
    <script>
        let siswa = ["Fin", "Rara", "kevin", "Devara", "Naura"];

        siswa.push("Mira");

        if(siswa.length < 5){
            console.info("Siswanya dikit");
        }else if(siswa.length > 5 ){
            console.info("Siswanya kebanyakan");
        }else{
            console.info("pas lah");
        }
    </script>
</body>
</html>
