<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipe Data Array</title>
</head>
<body>
    <script>
        let listNama = ["Fin", "Saba", "Haru", "Reko", "ChaNii"];

        listNama.push("Arisu");
        listNama.push("Devara");
        listNama.push("Rara", "Naura", "Suyudana")

        document.writeln(`<p> Jumlah data : ${listNama.length} </p>`);
        document.writeln(`<p> ${listNama} </p>`);
        console.table(listNama);
    </script>
</body>
</html>
