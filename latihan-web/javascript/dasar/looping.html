<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Looping</title>
  </head>
  <body>
    <script>
      let person = [
        {
          firstName: "Fin",
          lastName: "Skuyy",
        },
        { firstName: "Gawr", lastName: "Gura" },
        { firstName: "Gawr", lastName: "Gura" },
        { firstName: "Ayunda", lastName: "Risu" },
      ];

      for (let i in person) {
        let first = person[i].firstName;
        let last = person[i].lastName;
        document.writeln(`<p>Selamat datang ${first} ${last} </p>`);
      }

      for (let i = 1; i <= 30; i++) {
        if (i % 3 == 0 && i % 5 == 0) {
          document.writeln("<p>FizzBuzz</p>");
        } else if (i % 3 == 0) {
          document.writeln("<p>Fizz</p>");
        } else if (i % 5 == 0) {
          document.writeln("<p>Buzz</p>");
        } else {
          document.writeln(`<p>${i}</p>`);
        }
      }
    </script>
  </body>
</html>
