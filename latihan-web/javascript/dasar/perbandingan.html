<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perbandingan</title>
  </head>
  <body>
    <script>
      let dataOne = 1;
      let dataTwo = "1";

      //   Perbandingan isi data
      let resultOne = dataOne == dataTwo;
      document.writeln("<p>" + resultOne + "</p>");

      //   Perbandingan isi data dan tipe data
      let resultTwo = dataOne === dataTwo;
      document.writeln("<p>" + resultTwo + "</p>");
    </script>
  </body>
</html>
