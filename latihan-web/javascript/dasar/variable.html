<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Variable</title>
  </head>
  <body>
    <h1>
      <script>
        document.writeln(20.599);
        document.writeln("<br>");
        document.writeln(100);

        document.writeln("<br>");
        document.writeln("<br>");

        let iyakah = true;
        if (iyakah) {
          document.writeln("Tentu saja 'yes'");
        } else {
          document.writeln("Apasih?!");
        }

        document.writeln("<br>");
        document.writeln("<br>");

        let namaku = "Ahmad";
        let namanya = "Saputra";
        document.writeln(namaku + " "+'\n"Saputra"');
        document.writeln("<br>");
        document.writeln(namaku + " " + namanya);

        document.writeln("<br>");
        document.writeln("\\hallo")

        document.writeln("<br>");
        document.writeln("<br>");

        // String template pake backtick atau ``
        // Ini juga support multi-line string
        let firstName = "Ahmad";
        let lastName = "Saputra";
        document.writeln(`Nama : ${firstName} ${lastName}`);
      </script>
    </h1>
  </body>
</html>
