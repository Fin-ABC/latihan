<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nullish Coalescing Operator</title>
  </head>
  <body>
    <script>
        // Ini operator untuk mengubah isi data default dari variable yang null atau undefined
      let anything;
      let data = anything ?? "Data kosong wak";

      document.write(`<p> ${data} </p>`);
    </script>
  </body>
</html>
